<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Sangit Manandhar - Software Engineer" />
		<meta property="og:title" content="Sangit Manandhar - Software Engineer" />
		<meta property="og:description" content="Sangit Manandhar - Software Engineer" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://sangitmanandhar.com/" />
		<meta property="og:image" content="https://sangitmanandhar.com/favicon.svg" />
		<meta property="og:site_name" content="Sangit Manandhar" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Sangit Manandhar - Software Engineer" />
		<meta name="twitter:description" content="Sangit Manandhar - Software Engineer" />
		<meta name="twitter:image" content="https://sangitmanandhar.com/favicon.svg" />
		<meta name="theme-color" content="#ffffff" />
		<meta name="application-name" content="Sangit Manandhar" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="author" content="Sangit Manandhar" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<script>
			(function () {
				var stored = null;
				try {
					stored = localStorage.getItem('theme');
				} catch (e) {}
				if (!stored) {
					stored =
						window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
				}
				document.documentElement.setAttribute('data-theme', stored);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
